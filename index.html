<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para el amor de mi vida🩵</title>
    <style>
        :root { --celeste: #e3f2fd; --azul-amor: #068ddb; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { background: rgb(255, 255, 255); padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 400px; text-align: center; border: 2px solid var(--celeste); }
        h1 { color: var(--azul-amor); font-size: 1.4rem; margin-bottom: 20px; }
        #mensaje-contenedor { min-height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        p { color: #444; font-size: 1.1rem; line-height: 1.5; margin: 0; animation: fadeIn 0.8s; }
        button { background-color: var(--azul-amor); color: rgb(255, 255, 255); border: none; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: transform 0.2s, background 0.3s; box-shadow: 0 4px 15px rgba(0,119,182,0.3); }
        button:active { transform: scale(0.95); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Para Mi Hermosa Preciosa 🩵</h1>
        <div id="mensaje-contenedor">
            <p id="frase">Sé que hay dias en los cuales nos extrañamos o dudas de mi amor. Pero esto es para que cada vez que dudes o me extrañes puedas ver un detallesito con mucho amor. Te amo</p>
        </div>
        <button onclick="generarFrase()">Apreta para ver el mensaje🩵</button>
    </div>

    <script>

            "Mi día se vuelve perfecto en el instante en que hablo contigo.", "Tus ojos y sonrisa son la imagen que me da paz en cualquier momento.",

            "Una sola mirada tuya basta para calmar todas mis tormentas.", "Te tengo presente mucho más de lo que alcanzas a imaginar.",
            "Tener tu amor es el regalo más valioso que he recibido.", "Gracias por sostener mi mano y no soltarme nunca.",

            "En tus brazos encontré el lugar más seguro de la tierra.", "Me enamoro de nuevo de ti cada vez que te veo y sigo sin creer el pedazo de mujer que tengo a mi lado.",

            "Eres la definición perfecta de la ternura.", "Amo la forma en la que me haces sentir cuando estamos juntos.", "LLegaste para salvarme cuando ya creia que la vida no tenia sentido, y me demostraste que vale la pena vivirla y mas cuando tengo a una persona tan hermosa a mi lado para acompañrme. Te amo.",
            "Te mando un abrazo y un beso con muchisimo amor para que te llegue directo al corazón.", "Eres, sin duda, el mejor golpe de suerte que he tenido.",
            "No pasa un día sin que me sienta agradecido por tenerte.", "Eres mi historia favorita, esa que nunca quiero dejar de leer.",
            "Gracias por estar conmigo en las buenas y en las no tan buenas.", "Me gustas por mil razones, y también sin ninguna razón en especial.",
            "Eres el lugar donde siempre quiero quedarme a vivir.", "Hay pedacitos de ti en cada cosa que miro y me gusta.",
            "Me haces sentir amado de una forma única y especial.", "Eres el presente más hermoso que la vida me ha dado.",
            "No necesito nada más en este mundo si te tengo a ti.", "Eres luz, eres paz y eres puro amor para mí y el tesoro mas grande de mi vida.",
            "A veces creo que eres un pequeño milagro en mi vida.", "Tu amor me abraza por dentro y me da una calidez increíble.",
            "Eres el latido más dulce y constante que tengo.", "Qué increíble es aprender a amar de tu mano.",
            "Te amo con todo lo que soy, con mis luces y mis sombras.", "Eres mi principio, mi hoy y mi para siempre.",
            "Te elijo hoy, y te volvería a elegir cada mañana al despertar.", "Gracias por enseñarme lo que es el amor real Mi amor." , "Te amo aunque te pongas re tonta."
        ];

        function generarFrase() {
            const index = Math.floor(Math.random() * frases.length);
            const p = document.getElementById('frase');
            p.style.opacity = 0;
            setTimeout(() => {
                p.innerText = frases[index] + " 🩵";
                p.style.opacity = 1;
            }, 300);
        }
    </script>
</body>
</html>
